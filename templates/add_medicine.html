<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Medicine | Remedi 💊</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .toggle-btn input[type="radio"] { display: none; }
        .toggle-btn label {
            cursor: pointer;
            border: 2px solid #0d6efd;
            color: #0d6efd;
            padding: 6px 16px;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .toggle-btn input[type="radio"]:checked + label {
            background-color: #0d6efd;
            color: white;
        }
        ::placeholder { color: #bbb !important; }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <a href="/" class="navbar-brand fw-bold fs-3">💊 Remedi</a>
        </div>
    </nav>

    <div class="container mt-5" style="max-width: 500px;">
        <div class="card shadow">
            <div class="card-body p-4">
                <h4 class="mb-4 fw-bold">Add New Medicine</h4>

                <form method="POST" action="/add">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Medicine Name</label>
                        <input type="text" name="name" class="form-control"
                               placeholder="e.g. Paracetamol" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">How much to take?</label>
                        <div class="d-flex gap-2 align-items-center flex-wrap">
                            <input type="text" name="quantity" class="form-control"
                                   placeholder="e.g. 1, 2, ½" required style="width: 35%;">
                            <div class="d-flex gap-1 toggle-btn flex-wrap">
                                <div>
                                    <input type="radio" name="unit" id="tablet" value="Tablet" checked>
                                    <label for="tablet">Tablet</label>
                                </div>
                                <div>
                                    <input type="radio" name="unit" id="capsule" value="Capsule">
                                    <label for="capsule">Capsule</label>
                                </div>
                                <div>
                                    <input type="radio" name="unit" id="ml" value="ml">
                                    <label for="ml">ml</label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Strength <span class="text-muted fw-normal">(optional)</span></label>
                        <input type="text" name="dosage" class="form-control"
                               placeholder="e.g. 500mg, 10mg">
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Reminder Time & Meal</label>
                        <div class="d-flex align-items-center gap-2 flex-wrap">
                            <input type="number" name="hour" class="form-control text-center"
                                   min="1" max="12" placeholder="HH"
                                   style="width: 75px;" required>
                            <span class="fw-bold fs-5">:</span>
                            <input type="number" name="minute" class="form-control text-center"
                                   min="0" max="59" placeholder="MM"
                                   style="width: 75px;" required>

                            <div class="d-flex gap-1 toggle-btn">
                                <div>
                                    <input type="radio" name="ampm" id="am" value="AM" checked>
                                    <label for="am">AM</label>
                                </div>
                                <div>
                                    <input type="radio" name="ampm" id="pm" value="PM">
                                    <label for="pm">PM</label>
                                </div>
                            </div>

                            <div class="d-flex gap-1 toggle-btn">
                                <div>
                                    <input type="radio" name="food" id="before" value="Before Food">
                                    <label for="before">🍽️ Before</label>
                                </div>
                                <div>
                                    <input type="radio" name="food" id="after" value="After Food">
                                    <label for="after">🍽️ After</label>
                                </div>
                                <div>
                                    <input type="radio" name="food" id="anytime" value="" checked>
                                    <label for="anytime">Anytime</label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            💊 Save Medicine
                        </button>
                    </div>

                </form>
            </div>
        </div>
        <div class="text-center mt-3">
            <a href="/" class="text-muted">← Back to Dashboard</a>
        </div>
    </div>

</body>
</html>
